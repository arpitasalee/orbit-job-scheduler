services:
  db:
    image: postgres:16-alpine
    container_name: orbit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler_db
    ports:
      - "5432:5432"
    volumes:
      - orbit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d scheduler_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: orbit_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://scheduler:scheduler@db:5432/scheduler_db
      JWT_SECRET_KEY: dev-secret-change-me
      WORKER_POOL_SIZE: 3
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: orbit_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  orbit_pgdata:
